<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">Torque on a Current Loop — How a Motor Works</title>
  <desc>A rectangular current loop sits in a uniform horizontal magnetic field. The loop's magnetic dipole moment m equals N I A points along the normal direction n. Forces on two parallel sides are equal and opposite but offset — net torque equals m cross B rotates the loop toward alignment with B. Inset: a commutator switches current direction every half-turn so the torque keeps pushing the same way — that is the motor principle.</desc>
  <metadata>
    <cajal:figure
      xmlns:cajal="https://bearbrown.ai/cajal/1.0"
