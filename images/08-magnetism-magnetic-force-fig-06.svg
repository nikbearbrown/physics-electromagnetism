  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Loop in a Field — Torque Aligns m⃗ with B⃗</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Add a commutator and the torque never stops — that's an electric motor.</text>

  <!-- B field arrows (horizontal, rightward) -->
  <g stroke="#C8102E" stroke-width="1.5" fill="none">
    <line x1="60" y1="120" x2="640" y2="120" marker-end="url(#arrowred)"/>
    <line x1="60" y1="320" x2="640" y2="320" marker-end="url(#arrowred)"/>
  </g>
  <text x="650" y="124" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">B⃗</text>

  <!-- Loop (tilted rectangle at angle θ to B) -->
  <!-- Loop corners drawn as a parallelogram suggesting 3D tilt -->
  <g stroke="#56B4E9" stroke-width="2" fill="none">
    <path d="M 240 160 L 380 140 L 380 280 L 240 300 Z"/>
  </g>

  <!-- Current direction arrows on each side -->
  <line x1="310" y1="156" x2="350" y2="150" stroke="#56B4E9" stroke-width="1.5" marker-end="url(#arrowblue)"/>
  <line x1="380" y1="210" x2="380" y2="250" stroke="#56B4E9" stroke-width="1.5" marker-end="url(#arrowblue)"/>
  <line x1="310" y1="294" x2="280" y2="298" stroke="#56B4E9" stroke-width="1.5" marker-end="url(#arrowblue)"/>
  <line x1="240" y1="240" x2="240" y2="200" stroke="#56B4E9" stroke-width="1.5" marker-end="url(#arrowblue)"/>
  <text x="240" y="156" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#56B4E9">N · I</text>

  <!-- m⃗ vector (normal to loop, ~perpendicular to loop face) - tilted -->
  <line x1="310" y1="220" x2="430" y2="170" stroke="#C8860E" stroke-width="2.5" marker-end="url(#arrowoch)"/>
  <text x="436" y="170" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8860E">m⃗ = N I A n̂</text>

  <!-- θ between m and B -->
  <path d="M 380 220 A 70 70 0 0 0 396 188" stroke="#545454" stroke-width="0.75" fill="none"/>
  <text x="400" y="218" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">θ</text>

  <!-- Force arrows on parallel sides (out of plane shown as small arrows) -->
  <!-- Top side: force into page (drawn as ⊗ symbol) at midpoint -->
  <line x1="310" y1="150" x2="310" y2="80" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrowred)"/>
  <text x="318" y="100" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">F⃗ on top side</text>

  <!-- Bottom side: force out (down) at midpoint -->
  <line x1="310" y1="296" x2="310" y2="368" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrowred)"/>
  <text x="318" y="356" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">F⃗ on bottom (opposite)</text>

  <!-- Torque indicator (curved arrow showing rotation toward alignment) -->
  <path d="M 290 220 Q 320 232 350 215" stroke="#2a1a0e" stroke-width="1" fill="none" marker-end="url(#arrowred)"/>
  <text x="350" y="246" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#2a1a0e">τ⃗ = m⃗ × B⃗</text>

  <!-- Equilibrium annotation -->
  <text x="540" y="208" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">m⃗ ∥ B⃗ at equilibrium</text>
  <text x="540" y="222" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">U = −m⃗ · B⃗ minimum</text>

  <!-- Commutator inset -->
  <rect x="60" y="360" width="220" height="80" fill="#F5F5F5" stroke="#545454" stroke-width="0.75"/>
  <text x="170" y="378" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454" letter-spacing="0.06em">+ COMMUTATOR (MOTOR)</text>
  <!-- Schematic: two split rings + brushes -->
  <circle cx="120" cy="408" r="14" fill="none" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="120" y1="394" x2="120" y2="422" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="100" y1="408" x2="106" y2="408" stroke="#2a1a0e" stroke-width="2"/>
  <line x1="134" y1="408" x2="140" y2="408" stroke="#2a1a0e" stroke-width="2"/>
  <text x="170" y="404" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">switches I every</text>
  <text x="170" y="418" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">half-turn → τ always</text>
  <text x="170" y="432" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">pushes same direction</text>

  <!-- Caption -->
  <rect x="300" y="360" width="340" height="80" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="470" y="384" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#2a1a0e">τ⃗ = m⃗ × B⃗ rotates the loop toward alignment.</text>
  <text x="470" y="404" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Reverse current every half-turn and you keep pushing.</text>
  <text x="470" y="424" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">That's the motor principle.</text>
</svg>
