  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Lenz's Law — The Minus Sign Is Energy Conservation</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Drop the minus sign in Faraday's law and you build a perpetual-motion machine.</text>

  <line x1="350" y1="80" x2="350" y2="380" stroke="#2a1a0e" stroke-width="0.5"/>

  <!-- Panel A: Correct (opposes) -->
  <text x="180" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#3AAE3A" letter-spacing="0.08em">(A) CORRECT — INDUCED B OPPOSES</text>

  <!-- Bar magnet (left, moving right) -->
  <rect x="60" y="200" width="60" height="30" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <rect x="60" y="200" width="30" height="30" fill="#56B4E9" opacity="0.4"/>
  <rect x="90" y="200" width="30" height="30" fill="#C8102E" opacity="0.4"/>
  <text x="75" y="220" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#56B4E9">S</text>
  <text x="105" y="220" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">N</text>
  <!-- v arrow -->
  <line x1="125" y1="215" x2="160" y2="215" stroke="#C8860E" stroke-width="2" marker-end="url(#arrowoch)"/>
  <text x="142" y="206" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8860E">v</text>

  <!-- Coil (right) -->
  <line x1="200" y1="180" x2="200" y2="250" stroke="#56B4E9" stroke-width="3"/>
  <line x1="220" y1="180" x2="220" y2="250" stroke="#56B4E9" stroke-width="3"/>
  <line x1="240" y1="180" x2="240" y2="250" stroke="#56B4E9" stroke-width="3"/>
  <!-- Induced current direction (creates N pole facing magnet) -->
  <text x="220" y="270" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">i_ind (creates N face)</text>

  <!-- Repulsive force on magnet -->
  <line x1="170" y1="240" x2="140" y2="240" stroke="#C8102E" stroke-width="2" marker-end="url(#arrowred)"/>
  <text x="155" y="258" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">F_on_magnet (opposes v)</text>

  <!-- Energy flow annotation -->
  <rect x="80" y="300" width="200" height="68" fill="#F5F5F5" stroke="#3AAE3A" stroke-width="1"/>
  <text x="180" y="320" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#3AAE3A">ENERGY BALANCE ✓</text>
  <text x="180" y="338" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">mech. work → electrical</text>
  <text x="180" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">→ I²R heat</text>

  <!-- Panel B: Wrong (attracts → runaway) -->
  <text x="510" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#C8102E" letter-spacing="0.08em">(B) HYPOTHETICAL WRONG SIGN</text>

  <!-- Bar magnet -->
  <rect x="390" y="200" width="60" height="30" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <rect x="390" y="200" width="30" height="30" fill="#56B4E9" opacity="0.4"/>
  <rect x="420" y="200" width="30" height="30" fill="#C8102E" opacity="0.4"/>
  <text x="405" y="220" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#56B4E9">S</text>
  <text x="435" y="220" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">N</text>
  <!-- v arrow (large, accelerating) -->
  <line x1="455" y1="215" x2="495" y2="215" stroke="#C8860E" stroke-width="3" marker-end="url(#arrowoch)"/>
  <text x="475" y="206" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8860E">v ↗ (grows)</text>

  <!-- Coil -->
  <line x1="530" y1="180" x2="530" y2="250" stroke="#56B4E9" stroke-width="3"/>
  <line x1="550" y1="180" x2="550" y2="250" stroke="#56B4E9" stroke-width="3"/>
  <line x1="570" y1="180" x2="570" y2="250" stroke="#56B4E9" stroke-width="3"/>
  <text x="550" y="270" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">i_ind (attracts harder)</text>

  <!-- Attractive force on magnet (assisting v) -->
  <line x1="465" y1="240" x2="510" y2="240" stroke="#C8102E" stroke-width="2" marker-end="url(#arrowred)"/>
  <text x="488" y="258" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">F_on_magnet (helps v)</text>

  <!-- Runaway annotation -->
  <rect x="410" y="300" width="200" height="68" fill="#F5F5F5" stroke="#C8102E" stroke-width="1"/>
  <text x="510" y="320" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">RUNAWAY  ✗</text>
  <text x="510" y="338" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">v → I → F → more v</text>
  <text x="510" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">perpetual motion</text>

  <!-- Caption -->
  <rect x="60" y="394" width="580" height="50" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="414" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Lenz's law isn't a separate principle — it's the minus sign in ε = − dΦ/dt.</text>
  <text x="350" y="432" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Energy conservation mandates that the induced current oppose the change.</text>
