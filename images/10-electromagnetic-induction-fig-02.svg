  <title id="fig-title">Lenz's Law as Energy Conservation</title>
  <desc>Two panels showing what happens when a bar magnet approaches a coil. Panel A (correct, with Lenz minus sign): the coil's induced current creates a magnetic moment that opposes the approach. External force is needed to push the magnet in. Mechanical work converts to electrical energy and then to I squared R heat. Energy balance closes. Panel B (hypothetical wrong sign): induced current attracts the magnet harder, magnet accelerates, flux change accelerates, force grows — runaway perpetual motion. Marked with a red X.</desc>
