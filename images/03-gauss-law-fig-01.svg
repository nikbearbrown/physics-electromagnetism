      priority="Important"
      author="Humanitarians AI"
      date-generated="2026-05-25"
      source-file="pantry/03-gauss-law-cajal.md"
    />
  </metadata>
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#56B4E9"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#C8102E"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Flux — Field Lines Crossing a Surface, Weighted by cos θ</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">The same field through three orientations gives three different fluxes.</text>

  <line x1="240" y1="80" x2="240" y2="380" stroke="#2a1a0e" stroke-width="0.5"/>
  <line x1="460" y1="80" x2="460" y2="380" stroke="#2a1a0e" stroke-width="0.5"/>

  <!-- Panel A: perpendicular (max flux) -->
  <text x="120" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">(A) PERPENDICULAR — MAX</text>
  <g stroke="#56B4E9" stroke-width="1.25" fill="none">
    <line x1="50" y1="150" x2="190" y2="150" marker-end="url(#arrowblue)"/>
    <line x1="50" y1="180" x2="190" y2="180" marker-end="url(#arrowblue)"/>
    <line x1="50" y1="210" x2="190" y2="210" marker-end="url(#arrowblue)"/>
    <line x1="50" y1="240" x2="190" y2="240" marker-end="url(#arrowblue)"/>
    <line x1="50" y1="270" x2="190" y2="270" marker-end="url(#arrowblue)"/>
  </g>
  <!-- Surface (vertical rectangle) -->
  <rect x="118" y="140" width="4" height="140" fill="#545454"/>
  <!-- Normal vector -->
  <line x1="124" y1="210" x2="160" y2="210" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrowred)"/>
  <text x="150" y="200" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">n̂</text>
  <text x="120" y="304" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">θ = 0°</text>
  <text x="120" y="334" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">Φ = E A</text>

  <!-- Panel B: tilted -->
  <text x="350" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">(B) TILTED θ — REDUCED</text>
  <g stroke="#56B4E9" stroke-width="1.25" fill="none">
    <line x1="280" y1="150" x2="420" y2="150" marker-end="url(#arrowblue)"/>
    <line x1="280" y1="180" x2="420" y2="180" marker-end="url(#arrowblue)"/>
    <line x1="280" y1="210" x2="420" y2="210" marker-end="url(#arrowblue)"/>
    <line x1="280" y1="240" x2="420" y2="240" marker-end="url(#arrowblue)"/>
    <line x1="280" y1="270" x2="420" y2="270" marker-end="url(#arrowblue)"/>
  </g>
  <!-- Tilted surface -->
  <line x1="338" y1="140" x2="358" y2="280" stroke="#545454" stroke-width="3"/>
  <!-- Normal at angle -->
  <line x1="348" y1="210" x2="384" y2="200" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrowred)"/>
  <text x="392" y="198" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">n̂</text>
  <!-- Angle arc -->
  <path d="M 372 210 A 24 24 0 0 0 372 200" stroke="#545454" stroke-width="0.75" fill="none"/>
  <text x="378" y="222" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">θ</text>
  <text x="350" y="304" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">0 &lt; θ &lt; 90°</text>
  <text x="350" y="334" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">Φ = E A cos θ</text>

  <!-- Panel C: parallel (zero flux) -->
  <text x="570" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#C8102E" letter-spacing="0.08em">(C) PARALLEL — ZERO</text>
  <g stroke="#56B4E9" stroke-width="1.25" fill="none">
    <line x1="500" y1="150" x2="640" y2="150" marker-end="url(#arrowblue)"/>
    <line x1="500" y1="180" x2="640" y2="180" marker-end="url(#arrowblue)"/>
    <line x1="500" y1="210" x2="640" y2="210" marker-end="url(#arrowblue)"/>
    <line x1="500" y1="240" x2="640" y2="240" marker-end="url(#arrowblue)"/>
    <line x1="500" y1="270" x2="640" y2="270" marker-end="url(#arrowblue)"/>
  </g>
  <!-- Horizontal surface (parallel to field) -->
  <rect x="500" y="208" width="140" height="4" fill="#545454"/>
  <!-- Normal points up -->
  <line x1="570" y1="208" x2="570" y2="174" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrowred)"/>
  <text x="578" y="186" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">n̂</text>
  <text x="570" y="304" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">θ = 90°</text>
  <text x="570" y="334" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">Φ = 0</text>

  <!-- Caption -->
  <rect x="60" y="380" width="580" height="60" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="400" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Flux counts net field lines through a surface, weighted by cos θ.</text>
  <text x="350" y="420" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">Φ = ∫ E⃗ · dA⃗</text>
  <text x="350" y="436" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="10" fill="#545454">The dot product does the angular bookkeeping.</text>
</svg>
