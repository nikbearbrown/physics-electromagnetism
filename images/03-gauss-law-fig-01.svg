<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">Electric Flux — Field Lines Through a Surface</title>
  <desc>Three side-by-side panels of the same uniform E field pointing rightward. Panel A: surface perpendicular to E — maximum flux EA. Panel B: surface tilted at angle theta — flux EA cos theta. Panel C: surface parallel to E — zero flux. Outward normal n shown in each panel.</desc>
  <metadata>
    <cajal:figure
      xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Physics +1: Electromagnetism"
      book-slug="physics-electromagnetism"
      chapter="03-gauss-law"
      figure-number="01"
      figure-title="Electric Flux Orientations"
      figure-slug="electric-flux"
