  <title id="fig-title">V Falls as 1/r, E Falls as 1/r squared</title>
  <desc>Linear plot from a point charge. V(r) equals kq/r curves down slowly. E(r) magnitude equals kq/r squared curves down faster. At r equals two, E has fallen to one-fourth but V has only fallen to one-half. Integrating an inverse-square law gives an inverse-linear one — V has one more power of r than E.</desc>
