  <title id="fig-title">Lorentz Force — Three Mutually Perpendicular Vectors</title>
  <desc>Schematic 3D perspective. A positive charge moves with velocity v along the x axis. A magnetic field B points along the z axis. The resulting force on the positive charge equals q times v cross B and points along the negative y axis. A right hand sketch indicates index along v, middle along B, and thumb along F. An inset shows a negative charge in the same configuration with the force reversed.</desc>
