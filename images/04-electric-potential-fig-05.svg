<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">Ring on Axis — V Route vs E Route</title>
  <desc>Two panels of the same ring of charge. In the V route, each dq on the ring is the same distance r equals square root of x squared plus R squared from the field point P. The scalar integral collapses immediately to V(x) equals kQ over square root of x squared plus R squared. In the E route, each dq contributes a vector dE; only the axial component survives, requiring a decomposition step before integration.</desc>
  <metadata>
    <cajal:figure
      xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Physics +1: Electromagnetism"
      book-slug="physics-electromagnetism"
      chapter="04-electric-potential"
      figure-number="05"
      figure-title="Ring on Axis — V vs E Route"
      figure-slug="ring-V-vs-E"
      figure-type="comparison"
      priority="Important"
      author="Humanitarians AI"
      date-generated="2026-05-25"
      source-file="pantry/04-electric-potential-cajal.md"
    />
  </metadata>
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#C8102E"/>
    </marker>
    <marker id="arrowgray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#545454"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Two Routes to the Same Field — One Is Easier</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Scalar V absorbs the angular projection into the gradient at the end.</text>

  <line x1="350" y1="80" x2="350" y2="380" stroke="#2a1a0e" stroke-width="0.5"/>

  <!-- Panel A: V route (left) -->
  <text x="180" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#56B4E9" letter-spacing="0.08em">(A) V ROUTE — ONE SCALAR INTEGRAL</text>

  <!-- Ring (ellipse in perspective) -->
  <ellipse cx="120" cy="290" rx="70" ry="18" fill="none" stroke="#56B4E9" stroke-width="2"/>
  <!-- Two charge elements -->
  <circle cx="60" cy="290" r="4" fill="#C8102E"/>
  <circle cx="180" cy="290" r="4" fill="#C8102E"/>
  <!-- Field point P on axis -->
  <circle cx="280" cy="180" r="4" fill="#2a1a0e"/>
  <text x="290" y="178" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#2a1a0e">P</text>
  <!-- Distance from each dq to P (same!) -->
  <line x1="60" y1="290" x2="280" y2="180" stroke="#545454" stroke-width="0.75" stroke-dasharray="3 2"/>
  <line x1="180" y1="290" x2="280" y2="180" stroke="#545454" stroke-width="0.75" stroke-dasharray="3 2"/>
  <text x="195" y="226" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">r = √(x² + R²)</text>
  <text x="80" y="230" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">same for all dq</text>

  <!-- Result -->
  <rect x="60" y="340" width="240" height="36" fill="#F5F5F5" stroke="#56B4E9" stroke-width="1"/>
  <text x="180" y="362" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#56B4E9">V(x) = kQ / √(x² + R²)</text>

  <!-- Panel B: E route (right) -->
  <text x="510" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#C8102E" letter-spacing="0.08em">(B) E ROUTE — VECTOR DECOMPOSITION</text>

  <!-- Ring -->
  <ellipse cx="450" cy="290" rx="70" ry="18" fill="none" stroke="#C8102E" stroke-width="2"/>
  <!-- Two diametric charge elements -->
  <circle cx="390" cy="290" r="4" fill="#C8102E"/>
  <circle cx="510" cy="290" r="4" fill="#C8102E"/>
  <!-- Field point P -->
  <circle cx="610" cy="180" r="4" fill="#2a1a0e"/>
  <text x="620" y="178" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#2a1a0e">P</text>
  <!-- dE vectors from each (full vectors then decomposed) -->
  <line x1="390" y1="290" x2="610" y2="180" stroke="#545454" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="510" y1="290" x2="610" y2="180" stroke="#545454" stroke-width="0.5" stroke-dasharray="2 2"/>
  <!-- Decomposed: axial (red, surviving) + radial (gray, canceling) at midpoint -->
  <line x1="500" y1="235" x2="500" y2="200" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrowred)"/>
  <line x1="500" y1="235" x2="540" y2="235" stroke="#545454" stroke-width="1" stroke-dasharray="2 2" marker-end="url(#arrowgray)"/>
  <text x="464" y="200" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">axial dE_x</text>
  <text x="528" y="248" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">cancels</text>

  <!-- Result -->
  <rect x="390" y="340" width="240" height="36" fill="#F5F5F5" stroke="#C8102E" stroke-width="1"/>
  <text x="510" y="362" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">E_x(x) = kQ x / (x² + R²)^(3/2)</text>

  <!-- Caption -->
  <rect x="60" y="396" width="580" height="48" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="416" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Two routes, one answer. V is easier — then E = −dV/dx.</text>
  <text x="350" y="434" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Compare to Fig 2.3: same geometry, vector route. V absorbs the projection.</text>
</svg>
