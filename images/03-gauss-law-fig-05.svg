  <desc>A conductor in an external field. Inside the bulk, E equals zero. Excess charges sit only on the outer surface — positive on one side, negative on the other, in response to the external field. Just outside the surface, E is perpendicular to the surface. A Gaussian pillbox straddling the surface gives E outside equals sigma over epsilon zero.</desc>
