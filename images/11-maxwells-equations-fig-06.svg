  <title id="fig-title">Hertz's 1887 Spark-Gap Experiment</title>
  <desc>Schematic of Hertz's 1887 laboratory setup. On the left a transmitter: induction coil drives capacitor plates with a small spark gap, oscillation around 100 megahertz. On the right a receiver: a small wire loop with its own micro-gap; sparks appear across that gap when the transmitter fires. Wavefronts propagate across the room from transmitter to receiver. Three confirmations: waves travel at the speed of light, reflect refract and polarize like light, and are transverse.</desc>
