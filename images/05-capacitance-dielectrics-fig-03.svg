  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Capacitors and Resistors Combine in Opposite Ways</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">C stores; R obstructs. Adding parallel paths helps storage, hinders obstruction.</text>

