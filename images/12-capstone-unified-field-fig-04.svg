  <title id="fig-title">Photoelectric Effect — Classical EM Breaks Here</title>
  <desc>Two-panel figure. Panel A: light incident on a metal surface; electrons emerge with maximum kinetic energy K_max if photon energy h f exceeds work function phi. Panel B: plot of K_max versus frequency. Below threshold no electrons; above threshold a straight line with slope h (Planck's constant) and y-intercept negative phi. Light intensity controls the number of electrons, not their energy. Einstein 1905: light arrives in quanta of energy h f.</desc>
