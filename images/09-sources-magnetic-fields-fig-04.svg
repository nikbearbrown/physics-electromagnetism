  <title id="fig-title">Parallel Wires — Same Direction Attract, Opposite Repel</title>
  <desc>Two side-by-side panels of parallel wires viewed in cross-section. Panel A: both currents into the page. Field lines from each wire encircle it; between the wires the fields oppose; force arrows point toward each other — attraction. Panel B: one current in, one out. Between the wires the fields add and the force arrows point apart — repulsion. Formula: F over L equals mu zero I one I two over two pi d.</desc>
