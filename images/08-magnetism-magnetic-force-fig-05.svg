  <text x="350" y="80" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">RHR: index = I,  middle = B,  thumb = F</text>

  <!-- Caption -->
  <rect x="60" y="334" width="580" height="76" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="354" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">The wire isn't charged; the moving carriers are.</text>
  <text x="350" y="374" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Each electron's magnetic force transfers momentum to the lattice — the wire moves.</text>
  <text x="350" y="394" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">Apparent paradox ("but motors do work?") resolves via the source's electric field — B itself does none.</text>
