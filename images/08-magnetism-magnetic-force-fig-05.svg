  <title id="fig-title">Force on a Current-Carrying Wire — F equals I L cross B</title>
  <desc>A straight wire carries current I along the positive x direction in an external magnetic field B that points into the page. The force F equals I L cross B points upward in the plane. Individual electrons drift in the negative x direction; each electron experiences a tiny magnetic force that transfers momentum to the lattice. The macroscopic wire feels the integrated force.</desc>
