  <title id="fig-title">Field Falloff — Geometry Sets the Slope</title>
  <desc>Log-log plot of electric-field magnitude versus distance. Point charge falls as 1 over r squared (slope minus two). Dipole falls as 1 over r cubed (slope minus three). Infinite plane is constant (slope zero). Fewer source dimensions relative to the field point means slower falloff with distance.</desc>
