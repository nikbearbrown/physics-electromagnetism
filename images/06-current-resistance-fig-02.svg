  <title id="fig-title">Resistivity from Silver to Fused Quartz — 26 Orders of Magnitude</title>
  <desc>Vertical log bar chart of electrical resistivity. Silver, copper, aluminum, tungsten are good conductors near ten to the minus eight ohm meters. Nichrome is a resistive alloy near ten to the minus six. Silicon is a semiconductor near six hundred forty. Fused quartz is an insulator near ten to the seventeen point eight. Metals and insulators are qualitatively different states of matter.</desc>
