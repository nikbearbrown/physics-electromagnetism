  <title id="fig-title">Electron-Volt Energy Scales — 22 Orders of Magnitude</title>
  <desc>Vertical log bar chart from one hundredth of an eV up to one followed by twenty zeros eV. Bars: thermal at room temperature 0.026 eV, visible photon 2 eV, hydrogen Rydberg 13.6 eV, X-ray photon a kilo-eV, nuclear binding per nucleon ten mega-eV, proton mass-energy 938 mega-eV, LHC beam per proton 6.8 tera-eV, Amaterasu cosmic ray 240 exa-eV. The Amaterasu particle carried about 40 joules — macroscopic kinetic energy concentrated in a single proton.</desc>
