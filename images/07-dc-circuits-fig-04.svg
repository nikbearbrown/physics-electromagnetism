  <title id="fig-title">Voltage Divider Loading — How Meter Impedance Changes the Answer</title>
  <desc>Three panels of the same 12 volt voltage divider with R one equals R two equals 1000 ohms. Panel A: ideal voltmeter (infinite impedance) reads 6 volts. Panel B: realistic 10 megaohm voltmeter reads about 5.997 volts. Panel C: cheap 10 kiloohm voltmeter reads about 5.45 volts. Every meter changes the circuit by being there.</desc>
