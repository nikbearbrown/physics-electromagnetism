  <rect x="60" y="384" width="580" height="60" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="404" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">The voltmeter sits in parallel with R₂. Its impedance combines.</text>
  <text x="350" y="422" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">High R_meter → low loading. Same physics as the laptop dimming the lamp.</text>
  <text x="350" y="438" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">High-impedance multimeters are engineered around this exact problem.</text>
