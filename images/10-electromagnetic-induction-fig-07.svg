  <text x="170" y="147" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#2a1a0e">Time constant</text>
  <text x="350" y="147" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#C8860E">τ = R C</text>
  <text x="530" y="147" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#C8860E">τ = L / R</text>

  <!-- Row 2: Stored energy -->
  <rect x="80" y="164" width="180" height="44" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="0.75"/>
  <rect x="260" y="164" width="180" height="44" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="0.75"/>
  <rect x="440" y="164" width="180" height="44" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="0.75"/>
  <text x="170" y="191" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#2a1a0e">Stored energy</text>
  <text x="350" y="191" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="12" fill="#2a1a0e">U = ½ C V²</text>
  <text x="530" y="191" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="12" fill="#2a1a0e">U = ½ L I²</text>

