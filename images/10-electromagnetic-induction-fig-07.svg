  <text x="530" y="235" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#2a1a0e">magnetic field</text>

  <!-- Row 4: Energy density -->
  <rect x="80" y="252" width="180" height="44" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="0.75"/>
  <rect x="260" y="252" width="180" height="44" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="0.75"/>
  <rect x="440" y="252" width="180" height="44" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="0.75"/>
  <text x="170" y="279" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#2a1a0e">Energy density</text>
  <text x="350" y="279" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="12" fill="#2a1a0e">u = ½ ε₀ E²</text>
  <text x="530" y="279" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="12" fill="#2a1a0e">u = B² / (2μ₀)</text>

  <!-- Row 5: Resists changes in -->
  <rect x="80" y="296" width="180" height="44" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="0.75"/>
