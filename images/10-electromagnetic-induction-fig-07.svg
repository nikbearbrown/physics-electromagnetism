  <title id="fig-title">RC and RL — Electric/Magnetic Mirror Pair</title>
  <desc>Two-column comparison. RC column: time constant equals R C, stored energy equals one-half C V squared, stored in electric field, energy density equals one-half epsilon zero E squared, element resists changes in voltage. RL column: time constant equals L over R, stored energy equals one-half L I squared, stored in magnetic field, energy density equals B squared over two mu zero, element resists changes in current. R appears in opposite places.</desc>
