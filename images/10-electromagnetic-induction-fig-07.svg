  <!-- Caption -->
  <rect x="60" y="370" width="580" height="74" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="390" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Energy lives in the field; the element resists changes in the relevant variable.</text>
  <text x="350" y="410" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Bigger R: slower for RC, faster for RL. The mirror is exact.</text>
  <text x="350" y="430" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">Ch 11 will show ½ε₀E² + B²/(2μ₀) is the total energy density of a propagating EM wave.</text>
