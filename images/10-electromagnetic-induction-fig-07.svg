  <text x="350" y="104" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#56B4E9" letter-spacing="0.06em">RC  (capacitor)</text>
  <text x="530" y="104" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E" letter-spacing="0.06em">RL  (inductor)</text>

