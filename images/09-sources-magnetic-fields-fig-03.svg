<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">Ampère's Law — Three Symmetry Templates</title>
  <desc>Three Amperian loops for the symmetries where Ampère's law solves B directly. Cylindrical: coaxial circle around a wire, B equals mu zero I over two pi r. Planar: rectangular loop straddling an infinite current sheet, B equals mu zero K over two on each side. Solenoid: rectangular loop with one side inside and one outside, B equals mu zero n I inside.</desc>
