  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Ampère's Law — Three Amperian Loops, One Recipe</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Same as Gauss for E (Ch 3 Fig 3.3): pick the loop so B pulls out of the integral.</text>

  <line x1="240" y1="80" x2="240" y2="370" stroke="#2a1a0e" stroke-width="0.5"/>
  <line x1="460" y1="80" x2="460" y2="370" stroke="#2a1a0e" stroke-width="0.5"/>

  <!-- Panel A: Cylindrical (wire) -->
  <text x="120" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">(A) CYLINDRICAL</text>

  <!-- Wire (dot = out of page) -->
  <circle cx="120" cy="220" r="5" fill="#56B4E9"/>
  <text x="120" y="200" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#56B4E9">I (out of page)</text>

  <!-- Amperian loop (dashed vermillion circle) -->
  <circle cx="120" cy="220" r="50" fill="none" stroke="#C8102E" stroke-width="1.25" stroke-dasharray="4 3"/>
  <text x="120" y="280" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">Amperian loop</text>

  <!-- B arrows tangent to loop -->
  <g stroke="#C8860E" stroke-width="1.25" fill="none">
    <line x1="170" y1="220" x2="170" y2="200" marker-end="url(#arrowoch)"/>
    <line x1="70" y1="220" x2="70" y2="240" marker-end="url(#arrowoch)"/>
    <line x1="120" y1="170" x2="140" y2="170" marker-end="url(#arrowoch)"/>
    <line x1="120" y1="270" x2="100" y2="270" marker-end="url(#arrowoch)"/>
  </g>

  <rect x="40" y="330" width="160" height="36" fill="#F5F5F5" stroke="#C8102E" stroke-width="1"/>
  <text x="120" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">B = μ₀ I / (2π r)</text>

  <!-- Panel B: Planar (sheet) -->
  <text x="350" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">(B) PLANAR SHEET</text>

