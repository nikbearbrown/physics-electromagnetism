  <text x="350" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">B = μ₀ K / 2  (each side)</text>

  <!-- Panel C: Solenoid -->
  <text x="570" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">(C) SOLENOID</text>

