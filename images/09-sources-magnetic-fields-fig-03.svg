  </g>

  <!-- Amperian rect loop -->
  <rect x="520" y="200" width="120" height="60" fill="none" stroke="#C8102E" stroke-width="1.25" stroke-dasharray="4 3"/>

  <!-- B inside (rightward) -->
  <line x1="540" y1="230" x2="620" y2="230" stroke="#C8860E" stroke-width="1.5" marker-end="url(#arrowoch)"/>
  <text x="580" y="222" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8860E">B inside</text>

  <rect x="480" y="330" width="180" height="36" fill="#F5F5F5" stroke="#C8102E" stroke-width="1"/>
  <text x="570" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">B = μ₀ n I</text>

