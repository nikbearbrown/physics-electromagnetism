  <title id="fig-title">Maxwell to Relativity — E and B as One Tensor</title>
  <desc>Two panels showing the same wire in two reference frames. Panel A: wire's rest frame. Electrons drift, ions stationary, lattice neutral. Pure B field around the wire. A test charge at rest nearby feels no force. Panel B: observer moving along with the electron drift. Now ions move, length-contraction asymmetry between positive and negative line charges makes the wire appear net charged. Both E and B exist in this frame. The test charge feels both electric and magnetic forces — summing to identical physical motion. Lorentz transformation rotates E and B into each other.</desc>
