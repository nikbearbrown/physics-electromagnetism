  <!-- Now both E (orange, from net charge) AND B (purple, smaller) -->
  <line x1="510" y1="280" x2="510" y2="232" stroke="#C8860E" stroke-width="1.5" marker-end="url(#arrowoch)"/>
  <text x="522" y="260" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8860E">E⃗ (induced)</text>
  <ellipse cx="510" cy="160" rx="40" ry="10" fill="none" stroke="#7B61A8" stroke-width="1"/>
  <polygon points="550 160, 542 156, 542 164" fill="#7B61A8"/>
  <text x="510" y="148" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#7B61A8">B⃗ (smaller)</text>

  <!-- Test charge (now moves at v_drift opposite, so feels both E and B; net same physics) -->
  <circle cx="510" cy="290" r="8" fill="#C8102E" stroke="#2a1a0e" stroke-width="0.75"/>
  <text x="510" y="294" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#FFFFFF">+</text>
  <text x="510" y="314" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">test q · in motion</text>
  <text x="510" y="330" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#3AAE3A">F_E + F_B → same motion</text>

  <text x="510" y="350" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">length contraction → net charge</text>

  <!-- Connecting arrow: Lorentz transformation -->
  <line x1="282" y1="376" x2="418" y2="376" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrowred)"/>
  <text x="350" y="372" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">Lorentz boost rotates E⃗ ↔ B⃗</text>

  <!-- Caption -->
  <rect x="60" y="394" width="580" height="50" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="414" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Same physical trajectory — only the decomposition into "electric" and "magnetic" changes.</text>
  <text x="350" y="432" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Maxwell's equations were already relativistic. Einstein just had to read them carefully (1905).</text>
