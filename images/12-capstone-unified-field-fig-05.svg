  <line x1="290" y1="240" x2="250" y2="240" stroke="#56B4E9" stroke-width="1.5" marker-end="url(#arrowoch)"/>
  <text x="280" y="252" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#56B4E9">e⁻ drift ←</text>

  <!-- B field circling above (purple) -->
  <ellipse cx="180" cy="160" rx="60" ry="14" fill="none" stroke="#7B61A8" stroke-width="1.5"/>
  <polygon points="240 160, 232 156, 232 164" fill="#7B61A8"/>
  <text x="180" y="146" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#7B61A8">B⃗ (pure)</text>

  <!-- Test charge (at rest in this frame) -->
  <circle cx="180" cy="280" r="8" fill="#C8102E" stroke="#2a1a0e" stroke-width="0.75"/>
  <text x="180" y="284" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#FFFFFF">+</text>
  <text x="180" y="304" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">test q · at rest</text>
  <text x="180" y="320" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#3AAE3A">F = 0</text>

  <text x="180" y="350" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">net charge = 0 → no E⃗</text>

  <!-- Panel B: Moving frame -->
  <text x="510" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#C8102E" letter-spacing="0.08em">(B) MOVING WITH ELECTRONS — E⃗ + B⃗</text>

  <rect x="390" y="200" width="240" height="20" fill="#F5F5F5" stroke="#56B4E9" stroke-width="1.5"/>

  <!-- Now electrons stationary, ions drift right; length contraction asymmetry → net negative -->
  <!-- Show ions slightly more spaced (length-contracted gaps differ) -->
  <g font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E" text-anchor="middle">
    <text x="410" y="214">+</text>
