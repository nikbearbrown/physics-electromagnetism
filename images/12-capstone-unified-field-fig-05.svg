  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Maxwell to Relativity — Same Physics, Two Frames</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">What's pure B here is a mix of E and B to someone moving past.</text>

  <line x1="350" y1="80" x2="350" y2="380" stroke="#2a1a0e" stroke-width="0.5"/>

  <!-- Panel A: Wire's rest frame -->
  <text x="180" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">(A) WIRE'S REST FRAME — PURE B⃗</text>

  <!-- Wire (horizontal) -->
  <rect x="60" y="200" width="240" height="20" fill="#F5F5F5" stroke="#56B4E9" stroke-width="1.5"/>

  <!-- Positive ions (stationary, +) -->
  <g font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E" text-anchor="middle">
