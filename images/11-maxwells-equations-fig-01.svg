<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">Maxwell's Paradox — Two Surfaces, Two Different Answers</title>
  <desc>A capacitor charging through a wire. An Amperian loop encircles the wire just before the capacitor. Two surfaces bounded by that loop: a flat disk pierced by the wire encloses conduction current I_c; a bag surface that detours between the plates encloses no wire, only changing electric flux. Pre-Maxwell Ampère's law gives two different answers. Maxwell's fix: add epsilon zero times d Phi E over d t — the displacement current — so both surfaces agree.</desc>
  <metadata>
    <cajal:figure
      xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Physics +1: Electromagnetism"
      book-slug="physics-electromagnetism"
      chapter="11-maxwells-equations"
      figure-number="01"
      figure-title="Maxwell's Paradox"
      figure-slug="maxwell-paradox"
