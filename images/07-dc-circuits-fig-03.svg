  <path d="M 440 180 L 432 186 L 448 192 L 432 198 L 448 204 L 432 210 L 448 216 L 432 222 L 448 228 L 440 234" stroke="#C8102E" stroke-width="1.5" fill="none"/>
  <text x="462" y="208" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#2a1a0e">R₂ = 6Ω</text>
