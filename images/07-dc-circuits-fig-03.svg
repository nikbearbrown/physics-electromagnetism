  <title id="fig-title">Two-Loop Circuit — One Node, One KCL Equation</title>
  <desc>Two-loop circuit. Left branch: 12 volt battery in series with R one equals 4 ohms. Right branch: 8 volt battery in series with R two equals 6 ohms. Both branches join at the top node and return through R three equals 3 ohms to ground. Nodal analysis at the top node gives V equals 52 over 9 volts, currents I one equals 1.56 amps and I two equals 0.37 amps flow into the node, I three equals 1.93 amps flows out.</desc>
