  <line x1="300" y1="135" x2="300" y2="180" stroke="#2a1a0e" stroke-width="1"/>
  <path d="M 300 180 L 292 186 L 308 192 L 292 198 L 308 204 L 292 210 L 308 216 L 292 222 L 308 228 L 300 234" stroke="#C8102E" stroke-width="1.5" fill="none"/>
  <text x="320" y="208" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#2a1a0e">R₃ = 3Ω</text>
