  <text x="282" y="158" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8860E">I₃</text>

  <!-- Solution box -->
  <rect x="500" y="100" width="180" height="190" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
  <text x="590" y="122" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#2a1a0e" letter-spacing="0.06em">SOLUTION</text>
  <line x1="514" y1="132" x2="666" y2="132" stroke="#2a1a0e" stroke-width="0.5"/>
  <g font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#2a1a0e">
    <text x="520" y="156">V  = 52/9 ≈ 5.78 V</text>
    <text x="520" y="180">I₁ = 1.56 A</text>
    <text x="520" y="204">I₂ = 0.37 A</text>
    <text x="520" y="228">I₃ = 1.93 A</text>
  </g>
  <line x1="514" y1="244" x2="666" y2="244" stroke="#56B4E9" stroke-width="0.5"/>
  <text x="590" y="266" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#56B4E9">KCL: I₁ + I₂ = I₃ ✓</text>
  <text x="590" y="282" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">1.56 + 0.37 = 1.93</text>

  <!-- Caption -->
  <rect x="60" y="394" width="580" height="50" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="414" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">One node equation: (ε₁−V)/R₁ + (ε₂−V)/R₂ = V/R₃.</text>
  <text x="350" y="432" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Solve for V; back-substitute for currents. The KCL check closes the loop.</text>
