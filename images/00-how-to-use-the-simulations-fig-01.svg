  <title id="fig-title">The Three-File Architecture for LLM-Assisted Simulation</title>
  <desc>Three files load on demand into the prompt context: CLAUDE.md holds coding constitution (libraries, constants, methods, verification); DESIGN.md holds visual constitution (palette, typography, layout); PROJECT.md holds the project ledger (chapter, deliverable, status). Each file feeds the central prompt only when relevant — instruction budget grows linearly with file size, so load only what each prompt needs.</desc>
