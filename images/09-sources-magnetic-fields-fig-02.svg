  <title id="fig-title">Three Geometries — Wire, Loop, Solenoid</title>
  <desc>Three side-by-side panels showing magnetic field configurations. Panel A: long straight wire with concentric circular field lines, B equals mu zero I over two pi r. Panel B: circular current loop with field lines on axis and surrounding pattern, B on axis equals mu zero I R squared over two times R squared plus z squared to the three-halves. Panel C: solenoid cross-section with uniform field inside and near-zero outside, B equals mu zero n I.</desc>
