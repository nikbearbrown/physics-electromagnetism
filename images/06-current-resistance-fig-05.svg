<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">Ohm's Law Is Not Fundamental — Four I-V Curves</title>
  <desc>Plot of current I versus voltage V. Ohmic resistor is a straight line through origin. Incandescent tungsten filament bends down sub-linearly as the wire heats. Diode is asymmetric, near zero below threshold then exponential. Semiconductor thermistor bends up super-linearly as heating excites more carriers.</desc>
  <metadata>
    <cajal:figure
      xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Physics +1: Electromagnetism"
      book-slug="physics-electromagnetism"
      chapter="06-current-resistance"
      figure-number="05"
      figure-title="Ohmic vs Non-Ohmic"
      figure-slug="ohmic-non-ohmic"
      figure-type="quantitative"
      priority="Important"
      author="Humanitarians AI"
      date-generated="2026-05-25"
      source-file="pantry/06-current-resistance-cajal.md"
    />
  </metadata>
  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Ohm's Law Is Empirical — Four Devices, Four I–V Shapes</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Each non-ohmic curve violates one of the three Drude approximations.</text>

  <!-- Axes -->
  <line x1="100" y1="380" x2="640" y2="380" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="100" y1="100" x2="100" y2="380" stroke="#2a1a0e" stroke-width="1"/>

  <text x="50" y="240" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454" letter-spacing="0.06em" transform="rotate(-90 50 240)">CURRENT I</text>
  <text x="370" y="408" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454" letter-spacing="0.06em">VOLTAGE V</text>

  <g font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454" text-anchor="middle">
    <text x="100" y="396">0</text>
  </g>

  <!-- Ohmic resistor: straight line through origin. Slope ~ 0.5 -->
  <line x1="100" y1="380" x2="640" y2="120" stroke="#56B4E9" stroke-width="2.5"/>
  <text x="620" y="138" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#56B4E9">ohmic (slope = 1/R)</text>

  <!-- Tungsten filament: sublinear (bends DOWN as V increases — slope decreases) -->
  <!-- Start at (100,380), curve down faster than ohmic. Pass through (340, 250) and end at (640, 180) -->
  <path d="M 100 380 Q 240 290 340 250 Q 460 220 640 180" stroke="#C8102E" stroke-width="2" fill="none"/>
  <text x="620" y="200" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">tungsten filament (sublinear)</text>

  <!-- Diode: near-zero below threshold V_th, then exponential -->
  <!-- Flat from (100,380) to (300, 380), then exponential up to (640, 130) -->
  <path d="M 100 380 L 280 380 Q 380 360 460 320 Q 540 260 640 130" stroke="#C8860E" stroke-width="2" fill="none"/>
  <text x="370" y="372" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8860E">diode (threshold)</text>

  <!-- NTC thermistor: superlinear (bends UP) -->
  <path d="M 100 380 Q 280 350 400 280 Q 500 220 580 130" stroke="#545454" stroke-width="2" fill="none"/>
  <text x="510" y="240" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#545454">NTC thermistor (superlinear)</text>

  <!-- V_threshold annotation -->
  <line x1="280" y1="378" x2="280" y2="385" stroke="#2a1a0e" stroke-width="0.75"/>
  <text x="280" y="358" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8860E">V_th</text>

  <!-- Caption -->
  <rect x="100" y="430" width="540" height="20" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="370" y="445" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#2a1a0e">When n, τ, or linearity breaks, Ohm's law breaks. Drude tells you exactly how.</text>
</svg>
