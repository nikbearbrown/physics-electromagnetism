  <line x1="55" y1="158" x2="165" y2="158" stroke="#2a1a0e" stroke-width="0.75"/>
  <text x="110" y="178" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#2a1a0e">paste reference</text>
  <text x="110" y="194" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">image, snippet,</text>
  <text x="110" y="208" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">prior file</text>

  <!-- Box 2: SAY -->
  <rect x="200" y="120" width="140" height="100" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="270" y="148" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#2a1a0e" letter-spacing="0.08em">2. SAY</text>
  <line x1="215" y1="158" x2="325" y2="158" stroke="#2a1a0e" stroke-width="0.75"/>
  <text x="270" y="178" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#2a1a0e">one-sentence task</text>
  <text x="270" y="194" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">verb + object</text>
  <text x="270" y="208" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">no preamble</text>

