  <title id="fig-title">The Four-Move Prompt Scaffold</title>
  <desc>Every LLM exercise in the book follows four moves. Show: paste the reference. Say: state the task in one sentence. Constrain: name the rules and library. Verify: list explicit checks the student will perform. The fourth move is the one students skip — and it is the move that builds the diagnostic habit the rest of the book depends on.</desc>
