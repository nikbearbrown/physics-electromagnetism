  <rect x="60" y="290" width="580" height="84" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="312" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Without VERIFY, you generate code you can't trust.</text>
  <text x="350" y="332" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#2a1a0e">The fourth move is what turns a prompt into an experiment.</text>
  <text x="350" y="356" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">Show what · Say what · Constrain how · Verify whether</text>
