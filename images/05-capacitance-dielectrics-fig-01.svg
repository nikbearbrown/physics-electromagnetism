  <title id="fig-title">Three Canonical Capacitor Geometries</title>
  <desc>Three side-by-side cross-sections. Parallel plates with gap d and area A: C equals epsilon zero A over d. Coaxial cylinders with inner radius a and outer b, length L: C equals two pi epsilon zero L over log b over a. Concentric spheres with inner a and outer b: C equals four pi epsilon zero a b over b minus a. One recipe in three geometries.</desc>
