<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">Poynting Vector — Where the Wave Carries Energy</title>
  <desc>A snapshot of a plane wave. At points along the wave, E and B are drawn, and the local Poynting vector S equals one over mu zero times E cross B is drawn at each point — always pointing along the propagation direction. S is maximum at the wave peak and zero at the nodes. Time-averaged intensity equals E zero squared over two mu zero c. Sunlight at Earth's surface is about 1000 watts per square meter.</desc>
