  <title id="fig-title">Circular and Helical Motion in a Uniform Magnetic Field</title>
  <desc>Panel A: B field out of the page, charge enters perpendicular and traces a closed circle of radius r equals m v over q B. Panel B: B field along an axis, charge enters at an angle, velocity decomposes into parallel and perpendicular components. The perpendicular component traces a circle; the parallel component drifts. Result: a helix with pitch two pi m v parallel over q B.</desc>
