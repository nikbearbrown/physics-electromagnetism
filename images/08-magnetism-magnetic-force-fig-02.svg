  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Circular vs Helical — How Velocity Direction Sets the Trajectory</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">v ⊥ B → circle.  Any v∥ component → helix.</text>

  <line x1="350" y1="80" x2="350" y2="370" stroke="#2a1a0e" stroke-width="0.5"/>

  <!-- Panel A: Circular -->
  <text x="180" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">(A) v ⊥ B — CLOSED CIRCLE</text>

  <!-- B out of page (dots) -->
  <g fill="#C8102E">
    <circle cx="80" cy="140" r="2"/>
