    <circle cx="200" cy="300" r="2"/>
    <circle cx="240" cy="300" r="2"/>
    <circle cx="280" cy="300" r="2"/>
  </g>
  <text x="295" y="144" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">B⃗ (out of page)</text>

  <!-- Circle -->
  <circle cx="180" cy="220" r="60" fill="none" stroke="#56B4E9" stroke-width="2"/>
  <circle cx="180" cy="220" r="2.5" fill="#2a1a0e"/>
  <text x="180" y="234" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">center</text>

  <!-- radius line -->
  <line x1="180" y1="220" x2="240" y2="220" stroke="#545454" stroke-width="0.75" stroke-dasharray="3 2"/>
  <text x="210" y="214" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">r</text>

  <!-- Charge on circle + velocity tangent -->
  <circle cx="180" cy="160" r="6" fill="#C8102E" stroke="#2a1a0e" stroke-width="0.75"/>
  <text x="180" y="164" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#FFFFFF">+</text>
  <line x1="186" y1="160" x2="225" y2="160" stroke="#C8860E" stroke-width="1.5" marker-end="url(#arrowoch)"/>
  <text x="230" y="158" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8860E">v⃗</text>

  <!-- Result formula -->
  <rect x="60" y="330" width="240" height="36" fill="#F5F5F5" stroke="#56B4E9" stroke-width="1"/>
  <text x="180" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#56B4E9">r = m v / (|q| B)</text>

  <!-- Panel B: Helical -->
  <text x="510" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#C8102E" letter-spacing="0.08em">(B) v AT ANGLE — HELIX</text>

  <!-- Axis (B direction) -->
  <line x1="400" y1="300" x2="640" y2="180" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrowred)"/>
  <text x="645" y="178" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">B⃗</text>

  <!-- Helix path: zigzag of arcs (schematic) -->
  <g fill="none" stroke="#56B4E9" stroke-width="2">
    <path d="M 410 280 Q 430 240 460 250 Q 490 260 510 220 Q 530 200 560 215 Q 580 230 600 195"/>
  </g>

  <!-- Decomposed velocity (at start point) -->
  <circle cx="410" cy="280" r="6" fill="#C8102E" stroke="#2a1a0e" stroke-width="0.75"/>
  <text x="410" y="284" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#FFFFFF">+</text>

