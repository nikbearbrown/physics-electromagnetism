  <line x1="416" y1="276" x2="460" y2="250" stroke="#C8860E" stroke-width="1.5" marker-end="url(#arrowoch)"/>
  <text x="450" y="240" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8860E">v⃗</text>

  <!-- v_parallel (along B, dashed) -->
  <line x1="416" y1="276" x2="450" y2="260" stroke="#545454" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="446" y="276" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="8" fill="#545454">v∥</text>

  <!-- v_perp (perpendicular, dashed) -->
  <line x1="450" y1="260" x2="460" y2="250" stroke="#545454" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="464" y="266" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="8" fill="#545454">v⊥</text>

  <!-- Pitch annotation -->
  <line x1="450" y1="320" x2="540" y2="320" stroke="#545454" stroke-width="0.5"/>
  <text x="495" y="338" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">pitch p</text>

  <!-- Result formula -->
  <rect x="390" y="330" width="240" height="36" fill="#F5F5F5" stroke="#C8102E" stroke-width="1"/>
  <text x="510" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">p = 2π m v∥ / (|q| B)</text>

  <!-- Caption -->
  <rect x="60" y="394" width="580" height="50" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="414" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Cyclotron frequency ω_c = |q|B/m — same for circle or helix.</text>
  <text x="350" y="432" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">B does no work — speed is constant; only direction turns.</text>
