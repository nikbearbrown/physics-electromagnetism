  <title id="fig-title">Superconductivity Timeline — 1908 to 2023</title>
  <desc>Horizontal timeline. Onnes liquefies helium 1908. Onnes discovers mercury superconducts at 4.2 kelvin in 1911. BCS theory in 1957. Bednorz and Mueller find LBCO at 35 kelvin in 1986. YBCO at 92 kelvin in 1987 above liquid nitrogen. H3S at 203 kelvin in 2015. LaH10 around 250 kelvin in 2019. LK-99 claim in 2023 debunked. Critical temperature climbs in stair-step jumps.</desc>
