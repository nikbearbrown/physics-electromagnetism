  <desc>Same lattice as the Drude figure, but now each collision marker emits a phonon wave radiating outward. Between collisions, the electron gains kinetic energy from the field. At each collision, that gained energy is dumped into a lattice vibration. Macroscopic heat is the sum of all these phonon dumps; power equals current squared times resistance.</desc>
