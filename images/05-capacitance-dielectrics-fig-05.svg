  <title id="fig-title">RC Charging and Discharging — One Time Constant</title>
  <desc>Plot of charge Q as a fraction of final value versus time in units of tau equals R C. Charging curve rises from zero toward one as one minus e to the minus t over tau. Discharging curve falls from one toward zero as e to the minus t over tau. At t equals tau, the charging curve is at 0.63 and the discharging curve is at 0.37. After five tau, both reach within 1 percent of their asymptotes.</desc>
