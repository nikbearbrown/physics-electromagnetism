  <title id="fig-title">RL Circuit — Same Shape as RC, Inverted Time Constant</title>
  <desc>Plot of current as fraction of final value versus time in units of tau equals L over R. Rising curve: I of t equals epsilon over R times one minus e to the minus t over tau. Decaying curve: I of t equals I zero e to the minus t over tau. At one tau the rising curve is at 63 percent and the decaying curve is at 37 percent. Same shape as RC charging but tau equals L over R — larger R makes RL faster, not slower.</desc>
