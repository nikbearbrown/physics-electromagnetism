  <title id="fig-title">Dielectric Microphysics — Induced Dipoles Reduce the Field</title>
  <desc>Three panels of a parallel-plate capacitor. Panel A: no dielectric, uniform field E zero between plates. Panel B: dielectric inserted, atoms shown with electron clouds shifted, induced dipoles align with field, bound surface charges accumulate at the dielectric edges. Panel C: net result, field inside dielectric is reduced by a factor of kappa.</desc>
