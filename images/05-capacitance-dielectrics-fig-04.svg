  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Dielectric Microphysics — Why κ Reduces the Field</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Bound surface charges produce a counter-field. The dielectric adds opposition, not blockage.</text>

