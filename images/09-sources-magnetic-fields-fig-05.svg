<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">Gauss's Law for B — Magnetic Field Lines Always Close</title>
  <desc>Two panels comparing the asymmetry. Panel A: bar magnet with field lines emerging from N pole, looping around, and entering S pole — and continuing inside the magnet from S back to N to form closed loops. A Gaussian surface around just the N pole catches zero net flux. Panel B: point electric charge with radial field lines emerging outward and never closing — flux through Gaussian surface equals Q over epsilon zero. Magnetic field lines have no source or sink; electric field lines begin and end on charges.</desc>
  <metadata>
    <cajal:figure
      xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Physics +1: Electromagnetism"
      book-slug="physics-electromagnetism"
      chapter="09-sources-magnetic-fields"
      figure-number="05"
      figure-title="Gauss for B = 0"
      figure-slug="no-monopoles"
      figure-type="annotated-example"
      priority="Critical"
      author="Humanitarians AI"
      date-generated="2026-05-25"
      source-file="pantry/09-sources-magnetic-fields-cajal.md"
    />
  </metadata>
  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">∮ B⃗ · dA⃗ = 0  vs  ∮ E⃗ · dA⃗ = Q_enc / ε₀</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Magnetic field lines have no beginning. Electric field lines do.</text>

  <line x1="350" y1="80" x2="350" y2="380" stroke="#2a1a0e" stroke-width="0.5"/>

  <!-- Panel A: Bar magnet -->
  <text x="180" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">(A) BAR MAGNET — ΦB = 0</text>

  <!-- Magnet body -->
  <rect x="130" y="180" width="100" height="80" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <!-- N pole half (top) - vermillion -->
  <rect x="130" y="180" width="100" height="40" fill="#C8102E" opacity="0.35"/>
  <text x="180" y="206" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">N</text>
  <!-- S pole half (bottom) - blue -->
  <rect x="130" y="220" width="100" height="40" fill="#56B4E9" opacity="0.35"/>
  <text x="180" y="246" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#56B4E9">S</text>

  <!-- External field lines (purple) curving from N (top) around to S (bottom) -->
  <g fill="none" stroke="#7B61A8" stroke-width="1.25">
    <path d="M 160 180 Q 100 180 80 220 Q 70 250 90 260 Q 110 264 160 260"/>
    <path d="M 200 180 Q 260 180 280 220 Q 290 250 270 260 Q 250 264 200 260"/>
    <path d="M 180 175 Q 100 130 70 180 Q 50 240 80 280 Q 130 310 180 285"/>
    <path d="M 180 175 Q 260 130 290 180 Q 310 240 280 280 Q 230 310 180 285"/>
  </g>
  <!-- Internal field lines (purple, S to N inside magnet) -->
  <g stroke="#7B61A8" stroke-width="1" fill="none" stroke-dasharray="4 2">
    <line x1="160" y1="255" x2="160" y2="185"/>
    <line x1="180" y1="255" x2="180" y2="185"/>
    <line x1="200" y1="255" x2="200" y2="185"/>
  </g>

  <!-- Gaussian surface around just N pole (dashed) -->
  <ellipse cx="180" cy="200" rx="56" ry="34" fill="none" stroke="#2a1a0e" stroke-width="1.25" stroke-dasharray="3 2"/>
  <text x="180" y="158" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">Gaussian surface</text>

  <text x="180" y="306" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">ΦB = ∮ B⃗·dA⃗ = 0</text>
  <text x="180" y="326" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">every line entering also exits</text>

  <!-- Panel B: Point charge -->
  <text x="510" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">(B) POINT CHARGE — ΦE ≠ 0</text>

  <!-- Charge -->
  <circle cx="510" cy="220" r="10" fill="#C8102E" stroke="#2a1a0e" stroke-width="1"/>
  <text x="510" y="224" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#FFFFFF">+</text>

  <!-- Radial field lines (orange) -->
  <g stroke="#C8860E" stroke-width="1.25" fill="none">
    <line x1="510" y1="208" x2="510" y2="160"/>
    <line x1="510" y1="232" x2="510" y2="280"/>
    <line x1="498" y1="220" x2="450" y2="220"/>
    <line x1="522" y1="220" x2="570" y2="220"/>
    <line x1="502" y1="212" x2="470" y2="180"/>
    <line x1="518" y1="212" x2="550" y2="180"/>
    <line x1="502" y1="228" x2="470" y2="260"/>
    <line x1="518" y1="228" x2="550" y2="260"/>
  </g>
  <g fill="#C8860E">
    <polygon points="510 160, 506 168, 514 168"/>
    <polygon points="510 280, 506 272, 514 272"/>
    <polygon points="450 220, 458 216, 458 224"/>
    <polygon points="570 220, 562 216, 562 224"/>
  </g>

  <!-- Gaussian surface (dashed) -->
  <circle cx="510" cy="220" r="56" fill="none" stroke="#2a1a0e" stroke-width="1.25" stroke-dasharray="3 2"/>

  <text x="510" y="306" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8860E">ΦE = Q_enc / ε₀</text>
  <text x="510" y="326" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">lines start (or end) on the charge</text>

  <!-- Caption -->
  <rect x="60" y="390" width="580" height="50" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="410" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">No isolated magnetic charge has ever been detected.</text>
  <text x="350" y="428" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">The right-hand side of Gauss's law for B is identically zero.</text>
</svg>
