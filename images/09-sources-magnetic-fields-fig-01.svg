  <title id="fig-title">Biot-Savart Law — Magnetic Coulomb's Law with a Cross Product</title>
  <desc>A current-carrying wire with a single small element d L highlighted. A field point P sits at displacement r from the element. The resulting d B at P is perpendicular to both d L and r, with magnitude given by mu zero over four pi times I d L cross r-hat over r squared. Right-hand-rule sketch indicates orientation.</desc>
