  <title id="fig-title">Snell's Law and Total Internal Reflection</title>
  <desc>Two side-by-side panels showing light crossing a glass-air interface. Panel A: refraction below the critical angle — n one sin theta one equals n two sin theta two. Panel B: above the critical angle, the ray totally internally reflects. Critical angle equals arcsin of n air over n glass, about 42 degrees. Inset shows a fiber-optic cable where light bounces along by TIR.</desc>
