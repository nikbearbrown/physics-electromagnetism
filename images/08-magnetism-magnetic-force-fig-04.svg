  <text x="180" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#56B4E9" letter-spacing="0.08em">(A) ELECTRON CARRIERS</text>

  <!-- Strip -->
  <rect x="60" y="160" width="240" height="100" fill="none" stroke="#2a1a0e" stroke-width="1.5"/>
  <!-- Current (conventional, +x) -->
  <line x1="40" y1="210" x2="60" y2="210" stroke="#C8860E" stroke-width="2" marker-end="url(#arrowoch)"/>
  <text x="40" y="200" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8860E">I →</text>

  <!-- B (dots, out of page) -->
  <g fill="#C8102E">
