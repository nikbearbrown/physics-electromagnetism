  <title id="fig-title">Hall Effect — The Carrier Sign Shows Up in the Hall Voltage</title>
  <desc>Two side-by-side panels of the same conducting strip with current in the positive x direction and B field out of the page. Panel A with electron carriers: electrons drift in negative x, the magnetic force deflects them to the top edge, accumulating negative charges on top and positive on bottom, transverse E_H points down, Hall voltage is negative. Panel B with hole carriers: holes drift in positive x, deflect to the same top edge but with positive charge, transverse E_H points up, Hall voltage is positive.</desc>
