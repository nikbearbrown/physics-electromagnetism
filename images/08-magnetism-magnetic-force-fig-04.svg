  <line x1="244" y1="218" x2="220" y2="200" stroke="#56B4E9" stroke-width="0.75" stroke-dasharray="2 1"/>
  <text x="180" y="138" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#56B4E9">electrons drift ←, deflect ↑</text>

