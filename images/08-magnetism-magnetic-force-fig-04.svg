  <text x="510" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#C8102E" letter-spacing="0.08em">(B) HOLE CARRIERS</text>

  <rect x="390" y="160" width="240" height="100" fill="none" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="370" y1="210" x2="390" y2="210" stroke="#C8860E" stroke-width="2" marker-end="url(#arrowoch)"/>
  <text x="370" y="200" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8860E">I →</text>

