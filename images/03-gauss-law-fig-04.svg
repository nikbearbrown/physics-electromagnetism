  <title id="fig-title">Electric Field Profile for a Uniformly Charged Solid Sphere</title>
  <desc>Plot of E magnitude versus radius for a uniformly charged solid sphere. Inside the sphere (r less than R), the field grows linearly with r — only the enclosed fraction of charge contributes. Outside (r greater than R), the field falls as 1 over r squared like a point charge. The peak value is at the surface, r = R.</desc>
