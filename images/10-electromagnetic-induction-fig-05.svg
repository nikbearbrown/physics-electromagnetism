  <title id="fig-title">Transformer — Trading Voltage for Current at Fixed Power</title>
  <desc>Iron-core transformer schematic. Primary coil with N one turns on left side of a rectangular iron core; secondary coil with N two turns on right. A common flux circulates through the core. Voltage ratio equals turn ratio: V two over V one equals N two over N one. Current ratio is the inverse: I two over I one equals N one over N two. Power is conserved: V one times I one equals V two times I two.</desc>
