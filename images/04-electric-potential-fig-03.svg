  <title id="fig-title">Equipotential Atlas for Four Canonical Configurations</title>
  <desc>Four panels showing equipotential contours (dashed green) and field-line arrows (solid blue). Panel A: single positive charge with concentric circular equipotentials and radial field lines. Panel B: dipole with closed-loop equipotentials around each charge and the V equals zero plane perpendicular to the dipole axis. Panel C: two equal positive charges with figure-eight equipotentials and a saddle at the midline. Panel D: parallel plates with evenly spaced linear equipotentials between them. The field arrows always cross equipotentials at right angles.</desc>
