  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Coulomb's Torsion Balance — How the Inverse-Square Law Was Measured</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">A delicate silver wire twists; the angle is the force.</text>

