  <title id="fig-title">Coulomb's Torsion Balance — The 1785 Measurement of Charge Force</title>
  <desc>Cross-section of Coulomb's apparatus. A silver wire suspends a horizontal rod inside a glass cylinder; one end carries a charged pith ball, the other a counterweight. A second fixed charged ball at the cylinder rim repels the first; the suspension wire twists through angle theta read off a graduated scale at top. Torque is proportional to F, which is proportional to q1*q2/r squared. Doubling the distance reduces twist by a factor of four.</desc>
