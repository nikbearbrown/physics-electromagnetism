  <text x="350" y="402" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Coulomb measured force by watching how much a silver wire twisted.</text>
  <text x="350" y="422" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">τ ∝ F ∝ q₁ q₂ / r²</text>
  <text x="350" y="438" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#2a1a0e">Doubling the distance reduced the twist by a factor of four.</text>
