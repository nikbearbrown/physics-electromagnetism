  <text x="150" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">(A) SCHEMATIC</text>

  <!-- B field (horizontal) -->
  <g stroke="#7B61A8" stroke-width="1.5" fill="none">
