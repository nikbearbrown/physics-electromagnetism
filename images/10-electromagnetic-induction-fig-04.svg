  <text x="250" y="164" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#7B61A8">B⃗</text>

  <!-- Rotation axis (vertical) -->
  <line x1="150" y1="100" x2="150" y2="320" stroke="#545454" stroke-width="0.5" stroke-dasharray="3 2"/>

