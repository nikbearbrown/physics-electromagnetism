  <path d="M 116 100 Q 150 88 184 100" stroke="#C8102E" stroke-width="1.5" fill="none" marker-end="url(#arrowred)"/>
  <text x="150" y="84" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">ω</text>

