  <line x1="400" y1="220" x2="400" y2="316" stroke="#545454" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text x="400" y="328" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">T = 1/f</text>

  <text x="490" y="356" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">f = ω/(2π) = 60 Hz @ 3600 rpm</text>

  <!-- Caption -->
  <rect x="60" y="394" width="580" height="50" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
