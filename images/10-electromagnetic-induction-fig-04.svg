  <title id="fig-title">AC Generator — Rotating Coil Produces a Sinusoidal EMF</title>
  <desc>Two panel composite. Panel A schematic: a flat coil of N turns and area A rotates at angular frequency omega inside a uniform B field perpendicular to the rotation axis. Slip rings and brushes carry the EMF to external terminals. Panel B output waveform: epsilon of t equals N B A omega times sine of omega t, plotted over two periods. Peak EMF, RMS, and frequency are marked. At 60 hertz this is 3600 rotations per minute — the frequency that lights every wall socket in the US.</desc>
