  <text x="598" y="304" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#2a1a0e">F_net = 25.0 N</text>

  <!-- Ratio annotation -->
  <text x="180" y="284" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#545454">r₁₃ = 6 cm,  r₂₃ = 2 cm</text>
  <text x="180" y="302" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">(r₁₃ / r₂₃)² = 9   →   F₂₃ / F₁₃ = 9</text>

