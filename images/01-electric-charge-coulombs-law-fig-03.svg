  <text x="350" y="360" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Equal magnitudes, unequal distances — the closer charge dominates by nine.</text>
  <text x="350" y="378" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">In any superposition problem, find the dominant pair first; the rest are corrections.</text>
  <text x="350" y="394" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">F_net is the vector sum — here aligned because both pushes act in the same direction.</text>
