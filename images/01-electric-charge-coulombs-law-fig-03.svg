  <title id="fig-title">Three Charges in a Line — Superposition with a 9-to-1 Ratio</title>
  <desc>Three positive charges of one microcoulomb each at x equals zero, four centimeters, and six centimeters. On the third charge, two component forces act: a small force from the first charge (2.5 newtons) and a much larger force from the second (22.5 newtons). The net is 25 newtons. The closer charge dominates by a factor of nine because of inverse-square geometry.</desc>
