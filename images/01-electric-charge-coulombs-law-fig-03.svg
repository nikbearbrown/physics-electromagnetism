  <text x="380" y="244" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">x = 4 cm</text>
  <text x="520" y="244" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">x = 6 cm</text>

  <!-- Charge q1 -->
  <circle cx="100" cy="220" r="14" fill="#C8102E" stroke="#2a1a0e" stroke-width="1"/>
  <text x="100" y="225" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#FFFFFF">+</text>
  <text x="100" y="198" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#2a1a0e">q₁ = +1 µC</text>

  <!-- Charge q2 -->
  <circle cx="380" cy="220" r="14" fill="#C8102E" stroke="#2a1a0e" stroke-width="1"/>
  <text x="380" y="225" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#FFFFFF">+</text>
  <text x="380" y="198" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#2a1a0e">q₂ = +1 µC</text>

  <!-- Charge q3 (target) -->
  <circle cx="520" cy="220" r="14" fill="#C8102E" stroke="#2a1a0e" stroke-width="1"/>
  <text x="520" y="225" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#FFFFFF">+</text>
  <text x="520" y="198" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#2a1a0e">q₃ = +1 µC</text>

