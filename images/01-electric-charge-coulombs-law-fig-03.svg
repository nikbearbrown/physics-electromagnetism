  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Superposition — Closer Charge Wins by 9 to 1</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Equal magnitudes, unequal distances; inverse-square does the rest.</text>

  <!-- Axis line -->
  <line x1="80" y1="220" x2="660" y2="220" stroke="#2a1a0e" stroke-width="1"/>

