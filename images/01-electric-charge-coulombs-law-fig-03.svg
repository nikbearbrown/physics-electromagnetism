  <!-- Force F23 on q3 from q2 (large, red) -->
  <line x1="536" y1="140" x2="650" y2="140" stroke="#C8102E" stroke-width="2.5" marker-end="url(#arrowred)"/>
  <text x="592" y="130" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">F₂₃ = 22.5 N (dominant)</text>

