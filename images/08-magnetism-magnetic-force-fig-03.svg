  <title id="fig-title">Mass Spectrometer — Radius Proportional to Square Root of Mass</title>
  <desc>Top-down view of a mass spectrometer. Ion source at left, accelerating gap with potential V, slit, magnetic-field region with B out of page. Three carbon ion isotopes — carbon 12, 13, 14 — enter the field with the same charge and the same accelerated kinetic energy. Each arcs to a different radius proportional to the square root of its mass. Detectors at three positions read out the mass spectrum.</desc>
