  <title id="fig-title">Energy Density Lives in the Field Between the Plates</title>
  <desc>Cross-section of a parallel plate capacitor. The volume between the plates is shaded with the energy density u E equals one-half epsilon zero E squared. The plates themselves are flat with surface charges marked but no shading. An arrow connects the volume shading to the equation U total equals the integral of u E over volume, which equals one-half C V squared.</desc>
