  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">The Energy Is in the Field — Not on the Plates</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">u_E = ½ ε₀ E² is distributed throughout the volume where E⃗ is nonzero.</text>

