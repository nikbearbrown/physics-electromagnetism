  <rect x="568" y="178" width="98" height="56" fill="#F5F5F5" stroke="#C8102E" stroke-width="1"/>
  <text x="617" y="200" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">U = ∫ u_E dV</text>
  <text x="617" y="220" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">= ½ C V²</text>

