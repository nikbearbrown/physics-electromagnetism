  <!-- Annotation: u_E inside the shaded region -->
  <text x="310" y="208" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#C8102E">u_E = ½ ε₀ E²</text>
  <text x="310" y="226" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">energy density at every point in the field</text>

