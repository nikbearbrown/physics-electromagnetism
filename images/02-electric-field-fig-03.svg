  <title id="fig-title">Ring on Axis — How Symmetry Collapses a 2D Integral</title>
  <desc>A ring of radius R lies in the xy-plane, centered at the origin. A field point P sits on the z-axis at height z. Two diametrically opposite charge elements dq on the ring contribute field vectors dE at P. Each dE decomposes into an axial component (along z, surviving) and a radial component (perpendicular to z, canceling with its diametric partner). Only the axial component survives the sum.</desc>
