<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">Coulomb's Law in Vector Form — Like vs Opposite Charges</title>
  <desc>Two panels. Panel A: two positive charges with force vectors pointing outward along their displacement, Newton's third law pair labelled. Panel B: a positive and a negative charge with forces pointing inward, attracting. In both cases the displacement vector r points from q1 to q2 and the sign of q1*q2 controls direction.</desc>
  <metadata>
    <cajal:figure
      xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Physics +1: Electromagnetism"
      book-slug="physics-electromagnetism"
      chapter="01-electric-charge-coulombs-law"
      figure-number="02"
      figure-title="Coulomb's Law in Vector Form"
      figure-slug="coulomb-vector-form"
      figure-type="annotated-example"
      priority="Important"
      author="Humanitarians AI"
      date-generated="2026-05-25"
      source-file="pantry/01-electric-charge-coulombs-law-cajal.md"
    />
  </metadata>
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#C8102E"/>
    </marker>
    <marker id="arrowink" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#2a1a0e"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Coulomb's Law — Vector Form Carries Direction Automatically</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">The sign of q₁q₂ decides whether F points along r̂ or against it.</text>

  <line x1="350" y1="80" x2="350" y2="380" stroke="#2a1a0e" stroke-width="0.5"/>

  <!-- Panel A: Like charges (repulsion) -->
  <text x="180" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">(A) LIKE SIGNS — REPULSION</text>

  <!-- q1 -->
  <circle cx="110" cy="220" r="12" fill="#C8102E" stroke="#2a1a0e" stroke-width="1"/>
  <text x="110" y="225" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#FFFFFF">+</text>
  <text x="110" y="252" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">q₁</text>

  <!-- q2 -->
  <circle cx="280" cy="220" r="12" fill="#C8102E" stroke="#2a1a0e" stroke-width="1"/>
  <text x="280" y="225" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#FFFFFF">+</text>
  <text x="280" y="252" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">q₂</text>

  <!-- Displacement vector r (dashed, q1 to q2) -->
  <line x1="125" y1="210" x2="265" y2="210" stroke="#545454" stroke-width="0.75" stroke-dasharray="3 2" marker-end="url(#arrowink)"/>
  <text x="195" y="202" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">r̂ (from q₁ to q₂)</text>

  <!-- Force on q2 (rightward, away from q1) -->
  <line x1="296" y1="220" x2="340" y2="220" stroke="#C8102E" stroke-width="2" marker-end="url(#arrowred)"/>
  <text x="318" y="212" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">F₁₂</text>

  <!-- Force on q1 (leftward, away from q2) - Newton's 3rd law pair -->
  <line x1="94" y1="220" x2="50" y2="220" stroke="#C8102E" stroke-width="2" marker-end="url(#arrowred)"/>
  <text x="72" y="212" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">F₂₁</text>

  <text x="180" y="290" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">F₁₂ = −F₂₁ (Newton III)</text>
  <text x="180" y="312" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">q₁q₂ &gt; 0 → F along r̂</text>

  <!-- Panel B: Opposite charges (attraction) -->
  <text x="510" y="100" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#2a1a0e" letter-spacing="0.08em">(B) OPPOSITE SIGNS — ATTRACTION</text>

  <!-- q1 (+) -->
  <circle cx="440" cy="220" r="12" fill="#C8102E" stroke="#2a1a0e" stroke-width="1"/>
  <text x="440" y="225" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#FFFFFF">+</text>
  <text x="440" y="252" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">q₁</text>

  <!-- q2 (-) -->
  <circle cx="610" cy="220" r="12" fill="#56B4E9" stroke="#2a1a0e" stroke-width="1"/>
  <text x="610" y="225" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#2a1a0e">−</text>
  <text x="610" y="252" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">q₂</text>

  <!-- Displacement vector r -->
  <line x1="455" y1="210" x2="595" y2="210" stroke="#545454" stroke-width="0.75" stroke-dasharray="3 2" marker-end="url(#arrowink)"/>
  <text x="525" y="202" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">r̂ (from q₁ to q₂)</text>

  <!-- Force on q2 (leftward, toward q1) -->
  <line x1="594" y1="220" x2="550" y2="220" stroke="#C8102E" stroke-width="2" marker-end="url(#arrowred)"/>
  <text x="572" y="212" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">F₁₂</text>

  <!-- Force on q1 (rightward, toward q2) -->
  <line x1="456" y1="220" x2="500" y2="220" stroke="#C8102E" stroke-width="2" marker-end="url(#arrowred)"/>
  <text x="478" y="212" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">F₂₁</text>

  <text x="510" y="290" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">F₁₂ = −F₂₁ (Newton III)</text>
  <text x="510" y="312" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">q₁q₂ &lt; 0 → F against r̂</text>

  <!-- Master equation caption -->
  <rect x="80" y="370" width="540" height="64" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="394" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#C8102E">F⃗₁₂ = (k q₁ q₂ / r²) r̂</text>
  <text x="350" y="418" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#2a1a0e">One formula handles both cases; the sign of q₁q₂ does the bookkeeping.</text>
</svg>
