  <title id="fig-title">Three Symmetry Templates for Gauss's Law</title>
  <desc>Three side-by-side panels showing the three configurations where Gauss's law solves E directly. Spherical: concentric Gaussian sphere around a charged sphere, E radial, result E = Q over four pi epsilon zero r squared. Cylindrical: coaxial Gaussian cylinder around an infinite line charge, result E = lambda over two pi epsilon zero r. Planar: pillbox cylinder straddling an infinite charged plane, result E = sigma over two epsilon zero.</desc>
