  <title id="fig-title">Three Materials, One Variable — How Freely Charge Moves</title>
  <desc>Three side-by-side panels show a slab of material with positive charge deposited on one edge. Panel A (conductor): charge spreads across the entire outer surface within microseconds, indicated by arrows. Panel B (insulator): charge remains where deposited, with no spreading. Panel C (semiconductor): a few mobile carriers spread partially, bulk retains localization.</desc>
