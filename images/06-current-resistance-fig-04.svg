  <line x1="540" y1="350" x2="180" y2="350" stroke="#C8102E" stroke-width="2" marker-end="url(#arrowred)"/>
  <text x="360" y="368" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">net drift v_d ≪ thermal speed</text>

  <!-- Mean free time annotation -->
  <line x1="540" y1="210" x2="480" y2="250" stroke="#56B4E9" stroke-width="0.5" stroke-dasharray="2 2"/>
