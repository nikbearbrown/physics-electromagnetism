  <text x="495" y="214" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#56B4E9">over time τ</text>

  <!-- Caption -->
  <rect x="60" y="394" width="580" height="44" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="414" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Between collisions, free acceleration in E⃗. Each ×  resets the memory.</text>
  <text x="350" y="432" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Average over millions of trajectories: Ohm's law σ = ne²τ/m.</text>
