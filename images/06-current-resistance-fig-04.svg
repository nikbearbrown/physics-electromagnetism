  <title id="fig-title">Drude Model — Free Flight Between Collisions</title>
  <desc>A regular lattice of ion cores with an electron trajectory drawn through it. Between collision events (marked with red X's), the electron flies in a straight segment slightly biased in the direction opposite the applied field. After multiple collisions, the cumulative displacement equals drift velocity times time. Mean free time tau between collisions is labeled.</desc>
