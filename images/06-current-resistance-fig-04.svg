  <!-- Field arrow (applied to whole region) -->
  <line x1="60" y1="80" x2="120" y2="80" stroke="#C8860E" stroke-width="2" marker-end="url(#arrowoch)"/>
  <text x="130" y="84" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8860E">E⃗ (applied)</text>

  <!-- Electron trajectory (zigzag, drifting leftward — opposite E) - wait actually electrons drift opposite to E. If E points right then electron drifts left. But the lattice extends leftward too. Let's make E point right, electrons drift left, but trajectory shows it moving right slightly biased downward and zigzagging - actually easier to show electron moving from left to right with bias opposite to "expected" classical direction. Standard textbook convention: show E pointing right; electron drifts LEFT but starting position on right. -->
  <!-- Let me reorient: electron drifts in opposite to E direction. So if E points RIGHT, electron net displacement is LEFT. -->
  <!-- For visual clarity, let's flip: show E pointing LEFT and electron drifting right (textbook simplification, conventional current). Actually simpler: just show drift direction of electrons (leftward) with E pointing rightward. -->

  <!-- Trajectory: starts at right (640, 270), zigzags through, ends at left (100, 200). Each straight segment between collision markers. -->
  <polyline points="640,270 580,240 540,210 480,250 420,200 380,260 320,210 260,240 200,200 140,250 100,200"
    stroke="#56B4E9" stroke-width="1.5" fill="none"/>

