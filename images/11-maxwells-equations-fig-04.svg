  <rect x="0" y="0" width="700" height="460" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">EM Spectrum — Same Wave, 14 Orders of Magnitude in Frequency</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Radio and gamma are the same physics — separated by 10¹⁶.</text>

