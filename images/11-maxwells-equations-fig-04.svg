  <text x="350" y="262" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="9" fill="#545454" letter-spacing="0.06em">WAVELENGTH (λ = c/f)</text>

  <!-- Caption -->
  <rect x="60" y="380" width="580" height="62" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="402" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Radio waves and gamma rays are the same wave equation.</text>
  <text x="350" y="420" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">The visible band is a narrow strip where biology evolved sensitivity.</text>
  <text x="350" y="436" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">Rainbow is the one exception to the Brutalist no-gradient rule — visible light IS rainbow.</text>
