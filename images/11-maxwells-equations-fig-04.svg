  <text x="350" y="90" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="9" fill="#545454" letter-spacing="0.06em">PHOTON ENERGY</text>

  <!-- Bottom axis: frequency log scale 10^6 (60) to 10^22 (640) -->
