  <title id="fig-title">Electromagnetic Spectrum — Radio to Gamma, 14 Orders of Magnitude</title>
  <desc>Horizontal log axis from radio waves at 10 to the 6 hertz up to gamma rays at 10 to the 22 hertz. Bands shown: radio, microwave, infrared, visible (rendered as rainbow from red to violet), ultraviolet, X-ray, gamma. Top axis shows photon energy from micro-eV to MeV. Examples annotated beneath each band: AM/FM, WiFi, GPS, heat, sunlight, sterilization, medical, nuclear.</desc>
