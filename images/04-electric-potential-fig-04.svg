  <text x="350" y="406" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">V is large at the midpoint; E is zero there.</text>
  <text x="350" y="424" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">E⃗ = −∇V — a value can be high while its slope is flat.</text>
  <text x="350" y="440" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">Saddle points: high V, ∇V = 0.</text>
