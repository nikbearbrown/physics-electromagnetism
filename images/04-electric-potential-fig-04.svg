  <title id="fig-title">High V Does Not Mean High E — The Saddle Point</title>
  <desc>Two equal positive charges. Panel A: V heatmap is bright (high) everywhere near both charges, especially between them. Panel B: E magnitude heatmap is dark exactly at the midpoint between the two charges, where the gradient of V vanishes. Panel C: equipotential contours plus field arrows showing the saddle structure — at the midpoint, V is high but E is zero. V and E are derivative-related, not value-related.</desc>
