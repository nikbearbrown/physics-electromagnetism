  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Radiation Pressure — Light Carries Momentum</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Reflect a square meter of sunlight → push back with about 18 micronewtons. Constant. Free.</text>

  <!-- Sun symbol (left) -->
  <circle cx="80" cy="220" r="32" fill="#C8860E" opacity="0.8" stroke="#2a1a0e" stroke-width="1"/>
  <g stroke="#C8860E" stroke-width="2">
