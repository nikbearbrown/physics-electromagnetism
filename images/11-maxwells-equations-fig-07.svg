  <text x="530" y="386" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">first interplanetary solar sail</text>

  <!-- Caption -->
  <rect x="60" y="404" width="580" height="40" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="424" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">A small force, but free and constant — solar sails ride sunlight between planets.</text>
  <text x="350" y="438" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">Maxwell predicted radiation pressure; Lebedev measured it (1899); IKAROS rode it.</text>
