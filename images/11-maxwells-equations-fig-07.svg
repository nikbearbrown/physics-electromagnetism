  <title id="fig-title">Radiation Pressure — Light Pushes Solar Sails</title>
  <desc>A solar-sail spacecraft in space with the sail oriented perpendicular to incoming sunlight. EM waves impinge on the sail and reflect back. Force per area equals 2 I over c for a perfect reflector. Solar intensity at Earth is approximately 1370 watts per square meter, giving radiation pressure of about 9 micro-newtons per square meter for an absorber, doubled for a reflector. JAXA's IKAROS in 2010 was the first interplanetary solar-sail demonstration.</desc>
