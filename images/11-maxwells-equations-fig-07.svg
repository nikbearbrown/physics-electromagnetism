  <rect x="60" y="334" width="340" height="60" fill="#F5F5F5" stroke="#C8102E" stroke-width="1"/>
  <text x="230" y="354" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E" letter-spacing="0.06em">RADIATION PRESSURE</text>
  <line x1="76" y1="362" x2="384" y2="362" stroke="#C8102E" stroke-width="0.5"/>
  <text x="230" y="380" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#2a1a0e">P_abs = I/c       P_refl = 2I/c</text>

  <!-- IKAROS callout -->
  <rect x="420" y="334" width="220" height="60" fill="#F5F5F5" stroke="#56B4E9" stroke-width="1"/>
  <text x="530" y="352" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#56B4E9" letter-spacing="0.06em">PROOF — IKAROS</text>
